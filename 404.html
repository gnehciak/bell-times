<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page not found — Bell Times</title>
  <meta name="theme-color" content="#f7f8f9">
  <!-- Served by Vercel for any unmatched URL, so every path here is absolute. -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="home">
    <div class="home-inner">
      <div class="home-brand">
        <span class="home-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </span>
        <h1 class="home-title">Bell Times</h1>
      </div>

      <p class="home-tagline">That page doesn’t exist — find your school instead.</p>
      <p class="home-clock" id="home-clock" aria-hidden="true">&nbsp;</p>

      <div class="home-search" id="home-search">
        <span class="combo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input
          type="text"
          id="home-input"
          class="combo-input"
          role="combobox"
          aria-expanded="false"
          aria-controls="home-list"
          aria-autocomplete="list"
          aria-label="Search for your school"
          placeholder="Search your school…"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false">
        <ul id="home-list" class="combo-list home-list" role="listbox" aria-label="Schools" hidden></ul>
      </div>

      <div class="home-recent" id="home-recent" hidden>
        <span class="home-recent-label" id="home-recent-label">Your schools</span>
        <div class="home-recent-chips" id="home-recent-chips"></div>
      </div>

      <a class="home-all" href="/schools/">Browse all schools</a>
    </div>

    <footer class="home-foot">
      <p class="foot-nav"><a href="/about/">About</a></p>
      <p>Unofficial bell times for Sydney public high schools. Always check against your school's official timetable.</p>
    </footer>
  </main>

  <script src="/data.js"></script>
  <script src="/logos.generated.js"></script>
  <script src="/accents.generated.js"></script>
  <script src="/home.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
