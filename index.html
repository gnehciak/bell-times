<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="r4-bsI95SOJcvFtDo08IARdvgdUzPuhZQIrhIA3C8S8">
  <title>Bell Times — Live Bell Times &amp; Period Countdown for Sydney Schools</title>
  <meta name="description" content="Find your Sydney public high school and see a live countdown of time left in the current period — bell times, recess and lunch, updated every second.">
  <meta name="theme-color" content="#f7f8f9">
  <!-- data-abs holds the path; `npm run build` rewrites href/content to SITE_URL + path -->
  <link rel="canonical" data-abs="/" href="https://bell-times.vercel.app/">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <!-- Open Graph / social -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Bell Times">
  <meta property="og:title" content="Bell Times — Live Bell Times for Sydney Schools">
  <meta property="og:description" content="Find your Sydney public high school and see how long is left in the current period.">
  <meta property="og:url" data-abs="/" content="https://bell-times.vercel.app/">
  <meta property="og:image" data-abs="/favicon.svg" content="https://bell-times.vercel.app/favicon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Bell Times — Live Bell Times for Sydney Schools">
  <meta name="twitter:description" content="Find your Sydney public high school and see how long is left in the current period.">
  <script type="application/ld+json" data-seo="website">
  {"@context":"https://schema.org","@type":"WebSite","name":"Bell Times","description":"Live bell-time countdown for Sydney public high schools.","url":"/"}
  </script>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
</head>
<body>
  <main class="home">
    <div class="home-inner">
      <div class="home-brand">
        <span class="home-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </span>
        <h1 class="home-title">Bell Times</h1>
      </div>

      <p class="home-tagline">How long till the bell?</p>
      <p class="home-clock" id="home-clock" aria-hidden="true">&nbsp;</p>

      <div class="home-search" id="home-search">
        <span class="combo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input
          type="text"
          id="home-input"
          class="combo-input"
          role="combobox"
          aria-expanded="false"
          aria-controls="home-list"
          aria-autocomplete="list"
          aria-label="Search for your school"
          placeholder="Search your school…"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false">
        <ul id="home-list" class="combo-list home-list" role="listbox" aria-label="Schools" hidden></ul>
      </div>

      <div class="home-recent" id="home-recent" hidden>
        <span class="home-recent-label" id="home-recent-label">Your schools</span>
        <div class="home-recent-chips" id="home-recent-chips"></div>
      </div>

      <a class="home-all" href="/schools/">Browse all schools</a>
    </div>

    <footer class="home-foot">
      <p class="foot-nav"><a href="/about/">About</a></p>
      <p>Unofficial bell times for Sydney public high schools. Always check against your school's official timetable.</p>
    </footer>
  </main>

  <script defer src="data.js"></script>
  <script defer src="logos.generated.js"></script>
  <script defer src="accents.generated.js"></script>
  <script defer src="home.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
